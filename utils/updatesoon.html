<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fadeIn {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>

<body class="bg-slate-50 h-screen flex items-center justify-center overflow-hidden">
    <div class="flex flex-col items-center text-center px-6 animate-fadeIn">
        <!-- Icon ⏳ -->
        <div class="w-24 h-24 bg-white rounded-3xl shadow-xl shadow-slate-200/50 flex items-center justify-center text-4xl mb-6">
            ⏳
        </div>

        <!-- Heading chính -->
        <h3 class="text-2xl font-black text-slate-800 mb-6 tracking-tight uppercase">
            Sẽ sớm cập nhật
        </h3>

        <!-- Ô chữ nhật xanh chứa text "Update Soon" -->
        <div class="w-64 h-32 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200 shrink-0 mb-8">
            <span class="text-white font-bold text-2xl tracking-wider uppercase">
                Update Soon
            </span>
        </div>

        <!-- Đoạn văn mô tả -->
        <p class="text-slate-500 text-sm max-w-xs leading-relaxed mb-8">
            Nội dung này đang được <span class="font-semibold text-slate-700">Raymond</span> biên soạn và sẽ sớm có mặt. Vui lòng quay lại sau nhé!
        </p>

        <!-- Loading Dots -->
        <div class="flex gap-2">
            <div class="w-2.5 h-2.5 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
            <div class="w-2.5 h-2.5 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
            <div class="w-2.5 h-2.5 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
        </div>
    </div>
</body>

</html>
