  <script type="module">
    import { SerialConnection } from './serialConnection.js';

    const CONFIG = {
      chartPath: "./pages/heart_rate_chart.html",
      optionalServices: [
        "heart_rate", "battery_service", "device_information", "current_time",
        "0000ffe0-0000-1000-8000-00805f9b34fb",
        "00001234-0000-1000-8000-00805f9b34fb",
        "0000fff0-0000-1000-8000-00805f9b34fb"
      ]
    };

    const FLAG_PRINT_HEX = 0;
    const FLAG_PRINT_STRING = 1;

    const CONNECTION_TYPE = {
      NONE: 'none',
      BLE: 'ble',
      UART: 'uart'
    };
    const AppState = {
      connectionType: CONNECTION_TYPE.NONE
    };

    // For  UI testing
    const FLAG_SHOW_ALL_UI = false; // set TRUE to show all UI components without needing to connect to a device

    const Utils = {
      formatTimestamp: () => {
        const now = new Date();
        return `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
      },

      calculateCRC16: (data) => {
        let crc = 0;
        const polynomial = 0x8005;
        for (let i = 0; i < data.length; i++) {
          crc ^= (data[i] << 8);
          for (let j = 0; j < 8; j++) {
            if (crc & 0x8000) crc = (crc << 1) ^ polynomial;
            else crc = crc << 1;
            crc &= 0xFFFF;
          }
        }
        return crc;
      },

      decodeBleValue: (value, uuid = "") => {
        let hexArr = [];
        for (let i = 0; i < value.byteLength; i++) {
          hexArr.push(value.getUint8(i).toString(16).padStart(2, '0').toUpperCase());
        }
        const shortUuid = uuid.substring(4, 8).toLowerCase();
        let bpmValue = null;
        let interpreted = "";

        if (shortUuid === "2a37") {
          let flags = value.getUint8(0);
          bpmValue = (flags & 0x01) ? value.getUint16(1, true) : value.getUint8(1);
          interpreted = ` [BPM: ${bpmValue}]`;
        }

        const decoder = new TextDecoder('utf-8');
        let textVal = "";
        try {
          textVal = decoder.decode(value).replace(/[\x00-\x1F\x7F-\x9F]/g, "");
        } catch (e) {
          textVal = "(binary)";
        }

        return {
          hex: hexArr.join(' '),
          string: textVal,
          interpreted,
          bpm: bpmValue
        };
      }
    };

    class BLEManager {
      constructor() {
        this.device = null;
        this.server = null;

        this.service = null;
        this.writeChar = null;
        this.notifyChar = null;

        this.isConnected = false;

        // bind fixed handler references
        this.boundDisconnectHandler = this.handleDisconnect.bind(this);
        this.boundNotifyHandler = this.handleData.bind(this);

        this.UUIDS = {
          SERVICE: '0000fff0-0000-1000-8000-00805f9b34fb',
          WRITE: 'fff1',
          NOTIFY: 'fff2'
        };
      }

      async scan() {
        try {
          UI.log('info', 'Scanning...');
          this.device = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: CONFIG.optionalServices
          });

          // REMOVE OLD LISTENER FIRST
          this.device.removeEventListener(
            'gattserverdisconnected',
            this.boundDisconnectHandler
          );

          // ADD NEW
          this.device.addEventListener(
            'gattserverdisconnected',
            this.boundDisconnectHandler
          );

          this.server = await this.device.gatt.connect();

          this.isConnected = true;

          UI.updateConnectionBLEStatus(true, this.device.name || "Unknown Device");
          UI.updateDeviceBLEInfo(this.device.id, "N/A");

          UI.log('success', `Connected: ${this.device.name || 'Unknown'} successfully.`);

          if (
            this.device.name &&
            this.device.name.includes("T2D OS")
          ) {
            await this.autoSetup(this.server);
          }

        }
        catch (err) {
          UI.log('error', err.message);
          UI.updateConnectionBLEStatus(false);
        }
      }

      async autoSetup(gattServer) {

        try {
          // UI.log('info', '[T2D] Đang cấu hình tự động...');

          this.service = await gattServer.getPrimaryService(
            this.UUIDS.SERVICE
          );
          const chars = await this.service.getCharacteristics();
          this.writeChar = chars.find(c => c.uuid.includes(this.UUIDS.WRITE));

          this.notifyChar =
            chars.find(c =>
              c.uuid.includes(this.UUIDS.NOTIFY)
            );

          if (this.notifyChar) {
            await this.notifyChar.startNotifications();

            // REMOVE OLD
            this.notifyChar.removeEventListener('characteristicvaluechanged',
              this.boundNotifyHandler);

            // ADD NEW
            this.notifyChar.addEventListener('characteristicvaluechanged',
              this.boundNotifyHandler);
            // UI.log('success', '[T2D] Đã bật notify FFF2');
          }

        }
        catch (e) {
          UI.log('warning', '[T2D] Không tìm thấy service T2D');
        }
      }

      handleData(event) {

        const res =
          Utils.decodeBleValue(
            event.target.value,
            this.UUIDS.NOTIFY
          );

        if (FLAG_PRINT_HEX) {
          UI.log('info', `[RX] HEX: ${res.hex}`);
        }

        UI.log(
          'info',
          `${res.string}`
        );
      }

      async handleDisconnect() {

        if (!this.isConnected) {
          return;
        }

        this.isConnected = false;

        UI.log(
          'warning',
          'Bluetooth disconnected.'
        );

        try {
          if (this.notifyChar) {
            this.notifyChar.removeEventListener(
              'characteristicvaluechanged',
              this.boundNotifyHandler
            );
          }
        }
        catch (e) {
          UI.log('warning', 'Cleanup error: ' + e.message);
        }

        UI.updateConnectionBLEStatus(false);

        this.service = null;
        this.writeChar = null;
        this.notifyChar = null;
      }

      async sendCommand(str_cmd) {
        if (!this.writeChar) return UI.log('error', '[T2D] Không có quyền ghi FFF1');

        const payload = new TextEncoder().encode(str_cmd);
        // Construct frame: [type][len(2)][payload]
        // example command 'pwd' is: 01 0300 707764
        const frame = new Uint8Array(1 + 2 + payload.length);
        frame[0] = 0x01;
        frame[1] = payload.length & 0xFF;
        frame[2] = (payload.length >> 8) & 0xFF;
        frame.set(payload, 3);
        const method = this.writeChar.properties.write ? 'writeValueWithResponse' : 'writeValueWithoutResponse';
        await this.writeChar[method](frame);
      }

    }

    const UI = {
      elements: {
        statusBLEIcon: document.getElementById('statusBLEIcon'),
        statusBLEText: document.getElementById('statusBLEText'),
        connectBLEBtn: document.getElementById('connectBLEBtn'),
        disconnectBLEBtn: document.getElementById('disconnectBLEBtn'),
        terminalOutput: document.getElementById('terminal'),
        devicePanel: document.getElementById('devicePanel'),
        deviceMac: document.getElementById('deviceMacDisplay'),
        rssi: document.getElementById('rssiValue'),
        terminalInput: document.getElementById('terminal-input'),
        clearTerminalBtn: document.getElementById('clearTerminalBtn'),
        sendTerminalBtn: document.getElementById('sendTerminalBtn'),

        statusUartIcon: document.getElementById('statusIconUart'),
        statusUartText: document.getElementById('statusTextUart'),
        connectUartBtn: document.getElementById('connectUartBtn'),
        disconnectUartBtn: document.getElementById('disconnectUartBtn'),

      },
      init() {
        this.log('success', 'System initialized. Click "START SCAN" to begin.');
        this.elements.terminalInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            this.elements.sendTerminalBtn.click();
          }
        });
        this.elements.clearTerminalBtn.onclick = () => {
          this.elements.terminalOutput.innerHTML = "";
        };
        this.elements.sendTerminalBtn.onclick = () => {
          const val = this.elements.terminalInput.value.trim();
          this.elements.terminalInput.value = "";
          if (val) {
            UI.terminal_send(val);
          }
        };
      },
      log(type = 'info', message) {
        const logLine = document.createElement('div');
        logLine.className = 'log-line';
        const colors = {
          error: 'log-error',
          success: 'log-success',
          warning: 'log-warning',
          info: 'log-info'
        };

        const time = Utils.formatTimestamp();
        logLine.innerHTML = `<span class="log-timestamp">${time}</span><span class="${colors[type] || ''}">${message}</span>`;

        this.elements.terminalOutput.appendChild(logLine);
        this.elements.terminalOutput.scrollTop = this.elements.terminalOutput.scrollHeight;
      },
      async terminal_send(cmd) {
        UI.log('default', `> ${cmd}`);
        const parts = cmd.split(/\s+/);
        const cmd_1 = parts[0].toLowerCase();
        switch (cmd_1) {
          case 'clear':
            UI.clearlog();
            break;

          default:
            switch (AppState.connectionType) {
              case CONNECTION_TYPE.UART:
                serial.sendFrame(0x01, cmd);
                break;
              case CONNECTION_TYPE.BLE:
                ble.sendCommand(cmd);
              default:
                break;
            }
            break;
        }
      },

      clearlog() {
        this.elements.terminalOutput.innerHTML = "";
      },

      updateDeviceBLEInfo(id, rssi) {
        this.elements.deviceMac.textContent = id || "Unknown";
        this.elements.rssi.textContent = rssi ? `${rssi} dBm` : "-- dBm";
      },

      updateConnectionBLEStatus(isConnected, deviceName = "") {
        this.elements.connectBLEBtn.classList.toggle('hidden', isConnected);
        this.elements.disconnectBLEBtn.classList.toggle('hidden', !isConnected);

        if (isConnected) {
          this.elements.statusBLEIcon.className = "status-dot bg-green-500";
          this.elements.statusBLEText.classList.replace("text-gray-300", "text-green-400");
          this.elements.statusBLEText.textContent = "ONLINE";
          document.getElementById('deviceNameDisplay').textContent = deviceName || "Connected";
          this.elements.devicePanel.classList.remove('hidden');
        } else {
          this.elements.statusBLEIcon.className = "status-dot bg-gray-500";
          this.elements.statusBLEText.classList.replace("text-green-400", "text-gray-300");
          this.elements.statusBLEText.textContent = "OFFLINE";
          this.elements.devicePanel.classList.add('hidden');
          this.updateDeviceBLEInfo("Searching...", "--");
        }
      },

      updateConnectionUartStatus(isConnected) {
        this.elements.connectUartBtn.classList.toggle('hidden', isConnected);
        this.elements.disconnectUartBtn.classList.toggle('hidden', !isConnected);

        if (isConnected) {
          this.elements.statusUartIcon.className = "status-dot bg-green-500";
          this.elements.statusUartText.classList.replace("text-gray-300", "text-green-400");
          this.elements.statusUartText.textContent = "ONLINE";
        } else {
          this.elements.statusUartIcon.className = "status-dot bg-gray-500";
          this.elements.statusUartText.classList.replace("text-green-400", "text-gray-300");
          this.elements.statusUartText.textContent = "OFFLINE";
        }
      },


    }

    // Chart Initialization
    const ctx = document.getElementById('dataChart').getContext('2d');
    const dataChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: Array(20).fill(''),
        datasets: [{
          label: 'Sensor Data',
          data: Array(20).fill(0).map(() => Math.floor(Math.random() * 100)),
          borderColor: '#3b82f6',
          backgroundColor: 'rgba(59, 130, 246, 0.1)',
          borderWidth: 2,
          fill: true,
          tension: 0.4,
          pointRadius: 0
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { display: false },
          y: { beginAtZero: true, grid: { color: '#f3f4f6' } }
        }
      }
    });

    const ble = new BLEManager();
    const serial = new SerialConnection();

    // Update chart mock
    setInterval(() => {
      if (ble.isConnected) {
        dataChart.data.datasets[0].data.shift();
        dataChart.data.datasets[0].data.push(Math.floor(Math.random() * 100));
        dataChart.update('none');
      }
    }, 500);

    window.onload = () => {
      lucide.createIcons();
      UI.init();
      // Mobile popup menu
      const mobileMenuBtn = document.getElementById('mobileMenuBtn');
      const mobileMenu = document.getElementById('mobileMenu');

      mobileMenuBtn.onclick = (e) => {
        e.stopPropagation();
        mobileMenu.classList.toggle('hidden');
      };

      // click outside => close popup
      document.addEventListener('click', (e) => {
        if (
          !mobileMenu.contains(e.target) &&
          !mobileMenuBtn.contains(e.target)
        ) {
          mobileMenu.classList.add('hidden');
        }
      });

      UI.elements.connectBLEBtn.onclick = async () => {
        try {
          if (serial?.disconnect) {
            await serial.disconnect();
          }

          await ble.scan();
          AppState.connectionType = CONNECTION_TYPE.BLE;
        } catch (err) {
          UI.log('error', "BLE connect error:", err);
        }
      };

      UI.elements.disconnectBLEBtn.onclick = async () => {
        try {
          ble.device?.gatt.disconnect();
          AppState.connectionType = CONNECTION_TYPE.NONE;
        } catch (err) {
          UI.log('error', "BLE disconnect error:", err);
        }
      };


      UI.elements.connectUartBtn.onclick = () => {

        const connectSerial = () => {
          if (serial?.connect) {
            serial.connect()
              .then(() => {
                UI.updateConnectionUartStatus(true);
                AppState.connectionType = CONNECTION_TYPE.UART;
              })
              .catch((err) => {
                UI.updateConnectionUartStatus(false);
                UI.log('error', "UART connect error:", err);
              });
          }
        };

        try {

          if (ble.device?.gatt?.connected) {
            const device = ble.device;
            const onDisconnected = () => {
              device.removeEventListener('gattserverdisconnected', onDisconnected);
              connectSerial();
            };

            device.addEventListener(
              'gattserverdisconnected', onDisconnected);
            device.gatt.disconnect();
          } else {
            connectSerial();
          }

        } catch (err) {
          updateConnectionUartStatus(false);
          UI.log('error', "UART connect error:", err);
        }
      };

      UI.elements.disconnectUartBtn.onclick = async () => {
        serial?.disconnect()
          .then(() => {
            UI.updateConnectionUartStatus(false);
            AppState.connectionType = CONNECTION_TYPE.NONE;
          })
          .catch((err) => {
            UI.log('error', "UART disconnect error:", err);
          });

      };


      // Serial event handlers
      serial.onStatusChange = (type, msg) => {
        UI.log(type, msg);
      };

      serial.onDataReceived = (type, data) => UI.log(type, data);

      if (FLAG_SHOW_ALL_UI) {
        UI.elements.devicePanel.classList.remove('hidden');
        UI.elements.disconnectBLEBtn.classList.remove('hidden');
        UI.log('error', 'This is an error message');
        UI.log('info', 'Kết nối giả lập: T2D OS Device');
      }

    }

  </script>
</body>

</html>
