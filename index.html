<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T2DTECH BLE</title>

  <style>
    :root {
      --header-height: 72px;
      --footer-height: 28px;
      --sidebar-width: 280px;
    }

    body {
      background-color: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(110, 118, 129, 0.3);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(110, 118, 129, 0.5);
    }

    header nav {
      height: var(--header-height);
    }

    footer {
      height: var(--footer-height);
    }

    .main-container {
      flex-grow: 1;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      background-color: #0d1117;
    }

    .content-area {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .code-editor {
      flex-grow: 1;
      background-color: #0d1117;
      overflow: auto;
    }

    #terminal-view {
      height: 220px;
      min-height: 80px;
      max-height: 80vh;
      border-top: 1px solid #30363d;
      background-color: #010409;
      position: relative;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    #resizer-v {
      height: 6px;
      cursor: ns-resize;
      background: transparent;
      position: absolute;
      top: -3px;
      left: 0;
      right: 0;
      z-index: 100;
    }

    #resizer-v:hover,
    .resizing #resizer-v {
      background: rgba(33, 136, 255, 0.6);
    }

    body.resizing {
      cursor: ns-resize;
      user-select: none;
    }

    .terminal-logs {
      flex-grow: 1;
      overflow-y: auto;
      padding: 12px;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .terminal-input-container {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      border-top: 1px solid #161b22;
      background-color: #010409;
    }

    .line-number {
      width: 45px;
      text-align: right;
      padding-right: 15px;
      color: #484f58;
      user-select: none;
    }

    .log-line {
      display: flex;
      gap: 12px;
      margin-bottom: 2px;
    }

    .log-timestamp {
      color: #484f58;
      flex-shrink: 0;
    }

    .log-error {
      color: #f85149;
    }

    .log-info {
      color: #58a6ff;
    }

    .log-warning {
      color: #d29922;
    }

    .log-success {
      color: #3fb950;
    }

    .status-dot {
      height: 8px;
      width: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .scanning-active {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
      }
    }

    .service-item:hover {
      background-color: #161b22;
      color: #58a6ff;
    }

    .service-item.active {
      border-left-color: #3b82f6;
      background-color: #161b22;
    }

    .char-item {
      border-bottom: 1px solid #21262d;
    }

    .char-item:hover {
      background-color: #161b22;
    }

    .prop-badge {
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 3px;
      background: #21262d;
      color: #8b949e;
      margin-right: 4px;
      font-weight: bold;
    }

    .prop-badge.active {
      color: #58a6ff;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    #content-view-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }
  </style>
</head>

  <script>
    const CONFIG = {
      chartPath: "./pages/heart_rate_chart.html",
      optionalServices: [
        "heart_rate", "battery_service", "device_information", "current_time",
        "0000ffe0-0000-1000-8000-00805f9b34fb",
        "00001234-0000-1000-8000-00805f9b34fb",
        "0000fff0-0000-1000-8000-00805f9b34fb"
      ]
    };

    const Utils = {
      formatTimestamp: () => {
        const now = new Date();
        return `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
      },
      calculateCRC16: (data) => {
        let crc = 0;
        const polynomial = 0x8005;
        for (let i = 0; i < data.length; i++) {
          crc ^= (data[i] << 8);
          for (let j = 0; j < 8; j++) {
            if (crc & 0x8000) crc = (crc << 1) ^ polynomial;
            else crc = crc << 1;
            crc &= 0xFFFF;
          }
        }
        return crc;
      },
      decodeBleValue: (value, uuid = "") => {
        let hexArr = [];
        for (let i = 0; i < value.byteLength; i++) {
          hexArr.push(value.getUint8(i).toString(16).padStart(2, '0').toUpperCase());
        }
        const shortUuid = uuid.substring(4, 8).toLowerCase();
        let bpmValue = null;
        let interpreted = "";

        if (shortUuid === "2a37") {
          let flags = value.getUint8(0);
          bpmValue = (flags & 0x01) ? value.getUint16(1, true) : value.getUint8(1);
          interpreted = ` [BPM: ${bpmValue}]`;
        }

        const decoder = new TextDecoder('utf-8');
        let textVal = "";
        try {
          textVal = decoder.decode(value).replace(/[\x00-\x1F\x7F-\x9F]/g, ".");
        } catch (e) {
          textVal = "(binary)";
        }

        return {
          hex: hexArr.join(' '),
          string: textVal,
          interpreted,
          bpm: bpmValue
        };
      }
    };

    class BLET2D {
      constructor(parent) {
        this.parent = parent;
        this.service = null;
        this.writeChar = null;
        this.notifyChar = null;
        this.UUIDS = {
          SERVICE: '0000fff0-0000-1000-8000-00805f9b34fb',
          WRITE: 'fff1',
          NOTIFY: 'fff2'
        };
      }

      async autoSetup(gattServer) {
        UI.log('info', '[T2D] Đang cấu hình tự động...');
        try {
          this.service = await gattServer.getPrimaryService(this.UUIDS.SERVICE);
          const chars = await this.service.getCharacteristics();
          this.writeChar = chars.find(c => c.uuid.includes(this.UUIDS.WRITE));
          this.notifyChar = chars.find(c => c.uuid.includes(this.UUIDS.NOTIFY));

          if (this.notifyChar) {
            await this.notifyChar.startNotifications();
            this.notifyChar.addEventListener('characteristicvaluechanged', (e) => this.handleData(e));
            UI.log('success', '[T2D] Đã bật thông báo FFF2.');
          }
        } catch (e) {
          UI.log('warning', '[T2D] Không tìm thấy Service T2D OS.');
        }
      }

      handleData(event) {
        const res = Utils.decodeBleValue(event.target.value, this.UUIDS.NOTIFY);
        UI.log('info', `[T2D RX] HEX: ${res.hex}`);
      }

      async ls() {
        if (!this.writeChar) return UI.log('error', '[T2D] Không có quyền ghi FFF1');
        const payload = new TextEncoder().encode('ls');
        const frame = new Uint8Array(1 + 1 + 2 + payload.length + 2 + 1);
        frame[0] = 0x01;
        frame[1] = 0x01;
        frame[2] = payload.length & 0xFF;
        frame[3] = (payload.length >> 8) & 0xFF;
        frame.set(payload, 4);
        const crc = Utils.calculateCRC16(frame.slice(0, 4 + payload.length));
        frame[4 + payload.length] = crc & 0xFF;
        frame[5 + payload.length] = (crc >> 8) & 0xFF;
        frame[frame.length - 1] = 0x04;
        await this.writeChar.writeValue(frame);
        UI.log('success', '[T2D] Đã gửi lệnh LS');
      }

      reset() {
        this.service = this.writeChar = this.notifyChar = null;
      }
    }

    class BLEManager {
      constructor() {
        this.device = null;
        this.server = null;
        this.activeCharacteristics = [];
        this.notificationListeners = new Map();
        this.t2d = new BLET2D(this);
      }

      async scan() {
        try {
          UI.log('info', 'Đang quét thiết bị...');
          UI.elements.connectBtn.classList.add('scanning-active');
          this.device = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: CONFIG.optionalServices,
          });

          this.device.addEventListener('gattserverdisconnected', () => this.handleDisconnect());
          this.server = await this.device.gatt.connect();

          UI.updateDeviceInfo(this.device.id, "N/A");

          UI.log('success', `Kết nối thành công: ${this.device.name || 'Unknown'}`);
          UI.updateConnectionStatus(true, this.device.name);

          const services = await this.server.getPrimaryServices();
          UI.renderServices(services, (s) => this.showCharacteristics(s));

          if (this.device.name && this.device.name.includes("T2D OS")) {
            await this.t2d.autoSetup(this.server);
          }
        } catch (err) {
          UI.log('error', err.message);
          UI.updateConnectionStatus(false);
        }
      }

      handleDisconnect() {
        UI.log('warning', 'Mất kết nối Bluetooth.');
        this.t2d.reset();
        this.stopAllNotifications();
        UI.updateConnectionStatus(false);
      }

      async showCharacteristics(service) {
        try {
          this.activeCharacteristics = await service.getCharacteristics();
          UI.renderCharacteristics(this.activeCharacteristics, (char, short) => {
            if (char.properties.notify) UI.log('info', `Gõ 'notify ${short}' để lắng nghe.`);
            if (char.properties.read) UI.log('info', `Gõ 'read ${short}' để đọc giá trị.`);
          });
        } catch (err) {
          UI.log('error', err.message);
        }
      }

      async readValue(uuidArg) {
        try {
          const char = this.activeCharacteristics.find(c => c.uuid.includes(uuidArg.toLowerCase()));
          if (!char) return UI.log('error', `Không tìm thấy Characteristic: ${uuidArg}`);
          if (!char.properties.read) return UI.log('error', `Characteristic ${uuidArg} không hỗ trợ READ.`);

          UI.log('info', `Đang đọc ${uuidArg}...`);
          const value = await char.readValue();
          const res = Utils.decodeBleValue(value, char.uuid);
          UI.log('success', `[READ ${uuidArg}] HEX: ${res.hex} | STRING: ${res.string}`);
        } catch (err) {
          UI.log('error', `Lỗi khi đọc: ${err.message}`);
        }
      }

      async toggleNotify(uuidArg) {
        const char = this.activeCharacteristics.find(c => c.uuid.includes(uuidArg.toLowerCase()));
        if (!char) return UI.log('error', 'Không tìm thấy Characteristic.');
        if (this.notificationListeners.has(char)) return UI.log('warning', 'Đã bật trước đó.');

        await char.startNotifications();
        const listener = (event) => {
          const res = Utils.decodeBleValue(event.target.value, char.uuid);
          UI.log('info', `[${uuidArg}] ${res.hex}${res.interpreted}`);
          if (res.bpm !== null) UI.sendToIframe('BPM_DATA', res.bpm);
        };
        char.addEventListener('characteristicvaluechanged', listener);
        this.notificationListeners.set(char, listener);
        UI.log('success', `Đã bật NOTIFY cho ${uuidArg}`);
      }

      stopAllNotifications() {
        this.notificationListeners.forEach(async (listener, char) => {
          try {
            await char.stopNotifications();
            char.removeEventListener('characteristicvaluechanged', listener);
          } catch (e) { }
        });
        this.notificationListeners.clear();
      }

      async writeValue(uuidArg, data, isHex = false) {
        try {
          const char = this.activeCharacteristics.find(c => c.uuid.includes(uuidArg.toLowerCase()));
          if (!char) return UI.log('error', `Không tìm thấy Characteristic: ${uuidArg}`);

          let buffer;
          if (isHex) {
            const cleanHex = data.replace(/\s+/g, "");
            if (cleanHex.length % 2 !== 0) throw new Error("Chuỗi HEX không hợp lệ (lẻ ký tự)");
            buffer = new Uint8Array(cleanHex.match(/.{1,2}/g).map(b => parseInt(b, 16)));
          } else {
            buffer = new TextEncoder().encode(data);
          }

          const method = char.properties.write ? 'writeValueWithResponse' : 'writeValueWithoutResponse';
          await char[method](buffer);
          UI.log('success', `Đã ghi vào ${uuidArg}: ${data} (${isHex ? 'HEX' : 'String'})`);
        } catch (err) {
          UI.log('error', `Lỗi ghi: ${err.message}`);
        }
      }
    }

    const UI = {
      elements: {
        logs: document.getElementById('logs'),
        statusIcon: document.getElementById('statusIcon'),
        statusText: document.getElementById('statusText'),
        connectBtn: document.getElementById('connectBtn'),
        disconnectBtn: document.getElementById('disconnectBtn'),
        devicePanel: document.getElementById('devicePanel'),
        servicesSection: document.getElementById('servicesSection'),
        servicesList: document.getElementById('servicesList'),
        characteristicsView: document.getElementById('characteristicsView'),
        characteristicsList: document.getElementById('characteristicsList'),
        activeServiceLabel: document.getElementById('activeServiceLabel'),
        emptySidebarState: document.getElementById('emptySidebarState'),
        iframe: document.getElementById('content-view-frame'),
        codePage: document.getElementById('code_page'),
        editorLines: document.getElementById('editor-lines'),
        deviceMac: document.getElementById('deviceMacDisplay'),
        rssi: document.getElementById('rssiValue')
      },

      init() {
        lucide.createIcons();
        this.setupEditor();
        if (CONFIG.chartPath) {
          this.elements.iframe.src = CONFIG.chartPath;
          this.elements.iframe.onload = () => {
            this.elements.iframe.style.display = 'block';
            this.elements.codePage.style.display = 'none';
          };
        }
      },

      setupEditor() {
        this.elements.editorLines.innerHTML = "";
        for (let i = 1; i <= 20; i++) {
          this.elements.editorLines.innerHTML += `<div class="flex leading-6 group hover:bg-[#161b22]"><span class="line-number">${i}</span><span class="text-gray-500">// Hệ thống sẵn sàng...</span></div>`;
        }
      },

      log(type, message) {
        const logLine = document.createElement('div');
        logLine.className = 'log-line';
        const colors = {
          error: 'log-error',
          success: 'log-success',
          warning: 'log-warning',
          info: 'log-info'
        };
        logLine.innerHTML = `<span class="log-timestamp">${Utils.formatTimestamp()}</span><span class="${colors[type] || ''}">${message}</span>`;
        this.elements.logs.appendChild(logLine);
        this.elements.logs.scrollTop = this.elements.logs.scrollHeight;
      },

      updateDeviceInfo(id, rssi) {
        this.elements.deviceMac.textContent = id || "Unknown";
        this.elements.rssi.textContent = rssi ? `${rssi} dBm` : "-- dBm";
      },

      updateConnectionStatus(isConnected, deviceName = "") {
        this.elements.connectBtn.classList.remove('scanning-active');
        this.elements.connectBtn.classList.toggle('hidden', isConnected);
        this.elements.disconnectBtn.classList.toggle('hidden', !isConnected);
        this.elements.devicePanel.classList.toggle('hidden', !isConnected);
        this.elements.servicesSection.classList.toggle('hidden', !isConnected);
        this.elements.emptySidebarState.classList.toggle('hidden', isConnected);

        if (isConnected) {
          this.elements.statusIcon.className = "status-dot bg-green-500";
          this.elements.statusText.textContent = "ONLINE";
          document.getElementById('deviceNameDisplay').textContent = deviceName || "Connected";
        } else {
          this.elements.statusIcon.className = "status-dot bg-gray-500";
          this.elements.statusText.textContent = "READY";
          this.elements.characteristicsView.classList.add('hidden');
          this.updateDeviceInfo("Searching...", "--");
        }
      },

      renderServices(services, onServiceClick) {
        this.elements.servicesList.innerHTML = "";
        services.forEach(service => {
          const item = document.createElement('div');
          item.className = "service-item px-3 py-1.5 cursor-pointer rounded border-l-2 border-transparent text-[11px]";
          const short = service.uuid.substring(4, 8).toUpperCase();
          item.innerHTML = `<div class="font-bold text-gray-300">Service: ${short}</div><div class="text-[9px] opacity-40 truncate">${service.uuid}</div>`;
          item.onclick = () => {
            Array.from(this.elements.servicesList.children).forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            this.elements.activeServiceLabel.textContent = short;
            onServiceClick(service);
          };
          this.elements.servicesList.appendChild(item);
        });
      },

      renderCharacteristics(chars, onCharClick) {
        this.elements.characteristicsView.classList.remove('hidden');
        this.elements.characteristicsList.innerHTML = "";
        chars.forEach(char => {
          const div = document.createElement('div');
          div.className = "char-item p-3 cursor-pointer";
          const short = char.uuid.substring(4, 8).toUpperCase();
          const p = char.properties;
          let badges = `${p.read ? '<span class="prop-badge active">READ</span>' : ''}${p.write ? '<span class="prop-badge active">WRITE</span>' : ''}${p.notify ? '<span class="prop-badge active">NOTIFY</span>' : ''}`;
          div.innerHTML = `<div class="font-bold text-blue-400">Char: ${short}</div><div class="flex flex-wrap gap-1 mt-1">${badges}</div>`;
          div.onclick = () => onCharClick(char, short);
          this.elements.characteristicsList.appendChild(div);
        });
      },

      sendToIframe(type, data) {
        if (this.elements.iframe.contentWindow) this.elements.iframe.contentWindow.postMessage({
          type,
          value: data
        }, '*');
      }
    };

    const ble = new BLEManager();

    const Terminal = {
      input: document.getElementById('terminal-input'),
      init() {
        this.input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            const val = this.input.value.trim();
            this.input.value = "";
            if (val) this.execute(val);
          }
        });
      },
      async execute(raw) {
        UI.log('default', `> ${raw}`);
        const parts = raw.split(/\s+/);
        const cmd = parts[0].toLowerCase();

        switch (cmd) {
          case 'help':
            UI.log('info', 'Lệnh: scan, read [uuid], notify [uuid], stop notify, write [uuid] [data], writehex [uuid] [hex], ls, clear');
            break;

          case 'scan':
            ble.scan();
            break;

          case 'clear':
            UI.elements.logs.innerHTML = "";
            break;

          case 'ls':
            ble.t2d.ls();
            break;

          case 'read':
            if (parts[1]) {
              ble.readValue(parts[1]);
            } else {
              UI.log('error', "Sử dụng: read [uuid]");
            }
            break;

          case 'notify':
            ble.toggleNotify(parts[1] || "");
            break;

          case 'stop':
            if (parts[1] === 'notify') {
              ble.stopAllNotifications();
              UI.log('success', 'Đã dừng tất cả các luồng thông báo.');
            } else {
              UI.log('error', "Sử dụng: stop notify");
            }
            break;

          case 'write':
            if (parts[1] && parts[2]) {
              ble.writeValue(parts[1], parts.slice(2).join(' '), false);
            } else {
              UI.log('error', "Sử dụng: write [uuid] [data]");
            }
            break;

          case 'writehex':
            if (parts[1] && parts[2]) {
              ble.writeValue(parts[1], parts.slice(2).join(''), true);
            } else {
              UI.log('error', "Sử dụng: writehex [uuid] [hex]");
            }
            break;

          default:
            UI.log('error', 'Lệnh không xác định. Gõ "help" để xem danh sách.');
            break;
        }
      }
    };

    window.onload = () => {
      UI.init();
      Terminal.init();
      const resizer = document.getElementById('resizer-v');
      const terminal = document.getElementById('terminal-view');
      let resizing = false;
      resizer.onmousedown = () => {
        resizing = true;
        document.body.classList.add('resizing');
      };
      document.onmousemove = (e) => {
        if (!resizing) return;
        const h = window.innerHeight - e.clientY - 28;
        if (h > 80 && h < window.innerHeight * 0.8) terminal.style.height = h + 'px';
      };
      document.onmouseup = () => {
        resizing = false;
        document.body.classList.remove('resizing');
      };
      UI.elements.connectBtn.onclick = () => ble.scan();
      UI.elements.disconnectBtn.onclick = () => ble.device?.gatt.disconnect();
    };
  </script>
</body>

</html>
