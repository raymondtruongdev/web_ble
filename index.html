<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T2DTECH BLE</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --header-height: 72px;
      --footer-height: 28px;
      --sidebar-width: 280px;
    }

    body {
      background-color: #0d1117;
      color: #c9d1d9;
      height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.02);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(110, 118, 129, 0.3);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(110, 118, 129, 0.5);
    }

    header nav {
      height: var(--header-height);
    }

    footer {
      height: var(--footer-height);
    }

    .main-container {
      flex-grow: 1;
      display: flex;
      overflow: hidden;
    }

    .sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      border-right: 1px solid #30363d;
      display: flex;
      flex-direction: column;
      background-color: #0d1117;
    }

    .content-area {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .code-editor {
      flex-grow: 1;
      background-color: #0d1117;
      overflow: auto;
    }

    #terminal-view {
      height: 220px;
      min-height: 80px;
      max-height: 80vh;
      border-top: 1px solid #30363d;
      background-color: #010409;
      position: relative;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    #resizer-v {
      height: 6px;
      cursor: ns-resize;
      background: transparent;
      position: absolute;
      top: -3px;
      left: 0;
      right: 0;
      z-index: 100;
    }

    #resizer-v:hover,
    .resizing #resizer-v {
      background: rgba(33, 136, 255, 0.6);
    }

    body.resizing {
      cursor: ns-resize;
      user-select: none;
    }

    .terminal-logs {
      flex-grow: 1;
      overflow-y: auto;
      padding: 12px;
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .terminal-input-container {
      padding: 8px 12px;
      display: flex;
      align-items: center;
      border-top: 1px solid #161b22;
      background-color: #010409;
    }

    .line-number {
      width: 45px;
      text-align: right;
      padding-right: 15px;
      color: #484f58;
      user-select: none;
    }

    .log-line {
      display: flex;
      gap: 12px;
      margin-bottom: 2px;
    }

    .log-timestamp {
      color: #484f58;
      flex-shrink: 0;
    }

    .log-error {
      color: #f85149;
    }

    .log-info {
      color: #58a6ff;
    }

    .log-warning {
      color: #d29922;
    }

    .log-success {
      color: #3fb950;
    }

    .status-dot {
      height: 8px;
      width: 8px;
      border-radius: 50%;
      display: inline-block;
    }

    .scanning-active {
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.7);
      }

      70% {
        box-shadow: 0 0 0 10px rgba(59, 130, 246, 0);
      }

      100% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
      }
    }

    .service-item:hover {
      background-color: #161b22;
      color: #58a6ff;
    }

    .service-item.active {
      border-left-color: #3b82f6;
      background-color: #161b22;
    }

    .char-item {
      border-bottom: 1px solid #21262d;
    }

    .char-item:hover {
      background-color: #161b22;
    }

    .prop-badge {
      font-size: 9px;
      padding: 1px 4px;
      border-radius: 3px;
      background: #21262d;
      color: #8b949e;
      margin-right: 4px;
      font-weight: bold;
    }

    .prop-badge.active {
      color: #58a6ff;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    #content-view-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }
  </style>
</head>

<body>

  <header id="header-component">
    <nav class="bg-white border-b border-slate-200 px-6 py-3 flex items-center justify-between z-30 shadow-sm shrink-0">
      <div class="flex items-center gap-3">
        <a href="https://t2dtech.io.vn/" target="_blank" class="flex items-center gap-3">
          <img src="./res/h2t_logo.png" class="w-20 h-20 rounded-lg shadow object-contain"
            onerror="this.src='https://via.placeholder.com/40?text=LOGO'" />
          <span class="text-xl font-black tracking-tighter text-blue-600 uppercase">BLE COMMUNICATION</span>
        </a>
      </div>
      <div class="hidden md:flex gap-6 text-sm font-medium text-slate-500">
        <a href="https://t2dtech.io.vn/" class="hover:text-blue-600 transition">Our website</a>
        <button class="hover:text-blue-600 transition">Contact Us</button>
        <a href="mailto:t2dtech.vn@gmail.com" class="hover:text-blue-600 transition">Email</a>
      </div>
      <button class="md:hidden p-2 text-slate-600">
        <i data-lucide="menu" class="h-6 w-6"></i>
      </button>
    </nav>
  </header>

  <div class="main-container">
    <aside class="sidebar">
      <!-- Connection Section -->
      <div class="p-4 border-b border-[#30363d] space-y-4 bg-[#161b22]/30">
        <div class="flex items-center justify-between">
          <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Connection</span>
          <div id="statusBadge"
            class="flex items-center space-x-2 bg-[#0d1117] border border-[#30363d] px-2 py-0.5 rounded-full text-[10px]">
            <span id="statusIcon" class="status-dot bg-gray-500"></span>
            <span id="statusText" class="text-gray-400 font-medium uppercase text-[9px]">Ready</span>
          </div>
        </div>

        <div class="flex flex-col gap-2">
          <button id="connectBtn"
            class="w-full bg-blue-600 hover:bg-blue-500 text-white text-[11px] font-bold py-2 px-4 rounded-md transition flex items-center justify-center gap-2 shadow-lg">
            <i data-lucide="radio" class="w-4 h-4"></i> START SCAN
          </button>
          <button id="disconnectBtn"
            class="hidden w-full bg-red-900/50 hover:bg-red-800 text-red-200 border border-red-800/50 text-[11px] font-bold py-2 px-4 rounded-md transition">
            DISCONNECT DEVICE
          </button>
        </div>
      </div>

      <!-- Device Info Panel -->
      <div id="devicePanel" class="hidden border-b border-[#30363d] bg-[#0d1117] p-4 space-y-3">
        <div class="flex items-center space-x-2 text-blue-400">
          <i data-lucide="smartphone" class="w-4 h-4"></i>
          <span id="deviceNameDisplay" class="font-bold text-[13px] truncate">Device Name</span>
        </div>
        <div class="text-[10px] space-y-1">
          <div class="flex justify-between text-gray-500">
            <span>ID:</span>
            <span id="deviceMacDisplay" class="text-gray-300 font-mono italic">Searching...</span>
          </div>
          <div class="flex justify-between text-gray-500">
            <span>RSSI:</span>
            <span id="rssiValue" class="text-green-500 font-bold">-- dBm</span>
          </div>
        </div>
      </div>

      <!-- Services Section -->
      <div id="servicesSection" class="hidden border-b border-[#30363d] flex-grow flex flex-col overflow-hidden">
        <div class="p-2 text-[10px] font-bold text-gray-500 uppercase tracking-widest bg-[#161b22]/50">Services
        </div>
        <div id="servicesList" class="overflow-y-auto flex-grow text-[12px] p-1"></div>
      </div>

      <!-- Characteristics Section -->
      <div id="characteristicsViewContainer" class="flex-grow flex flex-col overflow-hidden">
        <div id="characteristicsView" class="hidden flex flex-col flex-grow overflow-hidden border-t border-[#30363d]">
          <div
            class="p-3 text-[10px] font-bold text-gray-500 uppercase tracking-widest flex justify-between items-center bg-[#0d1117]">
            <span>Characteristics</span>
            <span id="activeServiceLabel" class="text-blue-500 font-mono">UUID</span>
          </div>
          <div id="characteristicsList" class="overflow-y-auto flex-grow text-[12px]"></div>
        </div>

        <div id="emptySidebarState"
          class="flex flex-col items-center justify-center flex-grow p-6 text-center space-y-3 opacity-30 select-none">
          <i data-lucide="bluetooth" class="w-12 h-12"></i>
          <p class="text-[11px] font-medium leading-relaxed">No device connected.<br>Use the Scan button to
            start.</p>
        </div>
      </div>
    </aside>

    <main class="content-area" id="main-editor-area">
      <div id="content-view" class="flex-grow flex flex-col overflow-hidden">
        <iframe id="content-view-frame" src=""></iframe>

        <div id="code_page" class="code-editor p-4 font-mono text-[13px]">
          <div class="mb-4 text-blue-300">// T2DTECH BLE IDE - Nhấn SCAN để bắt đầu giải mã BPM.</div>
          <div id="editor-lines"></div>
        </div>
      </div>

      <div id="terminal-view">
        <div id="resizer-v"></div>
        <div
          class="flex items-center px-4 py-1.5 bg-[#161b22] border-b border-[#30363d] text-[10px] font-bold text-gray-500 space-x-6 select-none uppercase">
          <span class="text-blue-400 border-b border-blue-400 pb-0.5 cursor-pointer">Terminal</span>
        </div>
        <div id="logs" class="terminal-logs"></div>
        <div class="terminal-input-container font-mono text-[13px]">
          <span class="text-blue-400 mr-2 shrink-0">t2dtech@dev:~$</span>
          <input type="text" id="terminal-input" class="bg-transparent border-none outline-none text-white w-full"
            autofocus autocomplete="off" spellcheck="false" placeholder="Gõ 'help' để xem lệnh...">
        </div>
      </div>
    </main>
  </div>

  <footer
    class="bg-[#21262d] text-gray-400 flex items-center px-4 py-6 justify-center text-sm border-t border-[#30363d] select-none">
    <div class="flex items-center space-x-1">
      <span>Copyright 2026</span>
      <i data-lucide="copyright" class="w-3 h-3"></i>
      <span>T2DTECH Co. Ltd</span>
    </div>
  </footer>

  <script>
    /**
     * MODULE 1: CONFIG & UTILS
     */
    const CONFIG = {
      chartPath: "./pages/heart_rate_chart.html",
      optionalServices: [
        "heart_rate",
        "battery_service",
        "device_information",
        "0000ffe0-0000-1000-8000-00805f9b34fb",
        "current_time",
        "00001234-0000-1000-8000-00805f9b34fb"
      ]
    };

    const Utils = {
      formatTimestamp: () => {
        const now = new Date();
        return `[${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}:${now.getSeconds().toString().padStart(2, '0')}]`;
      },
      decodeBleValue: (value, uuid = "") => {
        let hexArr = [];
        for (let i = 0; i < value.byteLength; i++) {
          hexArr.push(value.getUint8(i).toString(16).padStart(2, '0').toUpperCase());
        }
        const shortUuid = uuid.substring(4, 8).toLowerCase();
        let bpmValue = null;
        let interpreted = "";

        if (shortUuid === "2a37") {
          let flags = value.getUint8(0);
          bpmValue = (flags & 0x01) ? value.getUint16(1, true) : value.getUint8(1);
          interpreted = ` [BPM: ${bpmValue}]`;
        }

        const decoder = new TextDecoder('utf-8');
        let textVal = "";
        try {
          textVal = decoder.decode(value).replace(/[\x00-\x1F\x7F-\x9F]/g, ".");
        } catch (e) {
          textVal = "(binary)";
        }

        return { hex: hexArr.join(' '), string: textVal, interpreted, bpm: bpmValue };
      }
    };

    /**
     * MODULE 2: UI CONTROLLER (Handles DOM Manipulation)
     */
    const UI = {
      elements: {
        logs: document.getElementById('logs'),
        statusIcon: document.getElementById('statusIcon'),
        statusText: document.getElementById('statusText'),
        connectBtn: document.getElementById('connectBtn'),
        disconnectBtn: document.getElementById('disconnectBtn'),
        devicePanel: document.getElementById('devicePanel'),
        servicesSection: document.getElementById('servicesSection'),
        servicesList: document.getElementById('servicesList'),
        characteristicsView: document.getElementById('characteristicsView'),
        characteristicsList: document.getElementById('characteristicsList'),
        activeServiceLabel: document.getElementById('activeServiceLabel'),
        emptySidebarState: document.getElementById('emptySidebarState'),
        iframe: document.getElementById('content-view-frame'),
        codePage: document.getElementById('code_page'),
        editorLines: document.getElementById('editor-lines')
      },

      init() {
        lucide.createIcons();
        this.setupEditor();
        this.setupIframe();
      },

      setupEditor() {
        if (!this.elements.editorLines) return;
        this.elements.editorLines.innerHTML = "";
        for (let i = 1; i <= 30; i++) {
          this.elements.editorLines.innerHTML += `
                        <div class="flex leading-6 group hover:bg-[#161b22]">
                            <span class="line-number">${i}</span>
                            <span class="text-gray-300">const heartRateDecoder = (data) => data[1];</span>
                        </div>`;
        }
      },

      setupIframe() {
        if (CONFIG.chartPath) {
          this.elements.iframe.src = CONFIG.chartPath;
          this.elements.iframe.onload = () => {
            this.elements.iframe.style.display = 'block';
            this.elements.codePage.style.display = 'none';
          };
        }
      },

      log(type, message) {
        const logLine = document.createElement('div');
        logLine.className = 'log-line';
        const colors = {
          error: 'log-error',
          success: 'log-success',
          warning: 'log-warning',
          info: 'log-info',
          default: 'text-gray-400'
        };
        const colorClass = colors[type] || colors.info;
        logLine.innerHTML = `<span class="log-timestamp">${Utils.formatTimestamp()}</span><span class="${colorClass}">${message}</span>`;
        this.elements.logs.appendChild(logLine);
        this.elements.logs.scrollTop = this.elements.logs.scrollHeight;
      },

      updateConnectionStatus(isConnected, deviceName = "") {
        this.elements.connectBtn.classList.remove('scanning-active');
        if (isConnected) {
          this.elements.statusIcon.className = "status-dot bg-green-500";
          this.elements.statusText.textContent = "ONLINE";
          this.elements.connectBtn.classList.add('hidden');
          this.elements.disconnectBtn.classList.remove('hidden');
          this.elements.devicePanel.classList.remove('hidden');
          this.elements.servicesSection.classList.remove('hidden');
          this.elements.emptySidebarState.classList.add('hidden');
          document.getElementById('deviceNameDisplay').textContent = deviceName || "Connected Device";
        } else {
          this.elements.statusIcon.className = "status-dot bg-gray-500";
          this.elements.statusText.textContent = "READY";
          this.elements.connectBtn.classList.remove('hidden');
          this.elements.disconnectBtn.classList.add('hidden');
          this.elements.devicePanel.classList.add('hidden');
          this.elements.servicesSection.classList.add('hidden');
          this.elements.characteristicsView.classList.add('hidden');
          this.elements.emptySidebarState.classList.remove('hidden');
          this.elements.servicesList.innerHTML = "";
        }
      },

      renderServices(services, onServiceClick) {
        this.elements.servicesList.innerHTML = "";
        services.forEach(service => {
          const item = document.createElement('div');
          item.className = "service-item px-3 py-1.5 cursor-pointer rounded border-l-2 border-transparent";
          const short = service.uuid.substring(4, 8).toUpperCase();
          item.innerHTML = `<div class="font-bold">Service: ${short}</div><div class="text-[9px] opacity-50 truncate">${service.uuid}</div>`;
          item.onclick = () => {
            Array.from(this.elements.servicesList.children).forEach(el => el.classList.remove('active'));
            item.classList.add('active');
            this.elements.activeServiceLabel.textContent = short;
            onServiceClick(service);
          };
          this.elements.servicesList.appendChild(item);
        });
      },

      renderCharacteristics(characteristics, onCharClick) {
        this.elements.characteristicsView.classList.remove('hidden');
        this.elements.characteristicsList.innerHTML = "";
        characteristics.forEach(char => {
          const div = document.createElement('div');
          div.className = "char-item p-3 cursor-pointer";
          const short = char.uuid.substring(4, 8).toUpperCase();
          const p = char.properties;
          let propsHtml = "";
          if (p.read) propsHtml += `<span class="prop-badge active">READ</span>`;
          if (p.write || p.writeWithoutResponse) propsHtml += `<span class="prop-badge active">WRITE</span>`;
          if (p.notify) propsHtml += `<span class="prop-badge active">NOTIFY</span>`;

          div.innerHTML = `
                        <div class="font-bold text-blue-400">Char: ${short}</div>
                        <div class="text-[10px] text-gray-500 truncate mb-2">${char.uuid}</div>
                        <div class="flex flex-wrap gap-1">${propsHtml}</div>`;

          div.onclick = () => onCharClick(char, short);
          this.elements.characteristicsList.appendChild(div);
        });
      },

      sendToIframe(type, data) {
        if (this.elements.iframe && this.elements.iframe.contentWindow) {
          this.elements.iframe.contentWindow.postMessage({ type, value: data }, '*');
        }
      }
    };

    /**
     * MODULE 3: BLE CORE (Logic Bluetooth)
     */
    const BLE = {
      device: null,
      server: null,
      activeCharacteristics: [],
      notificationListeners: new Map(),

      async scan() {
        try {
          UI.log('info', 'Đang quét thiết bị...');
          UI.elements.connectBtn.classList.add('scanning-active');
          this.device = await navigator.bluetooth.requestDevice({
            acceptAllDevices: true,
            optionalServices: CONFIG.optionalServices,
          });
          this.device.addEventListener('gattserverdisconnected', () => this.handleDisconnect());
          this.server = await this.device.gatt.connect();
          UI.log('success', 'Kết nối GATT thành công.');
          UI.updateConnectionStatus(true, this.device.name);
          this.discoverServices();
        } catch (err) {
          UI.log('error', 'Lỗi: ' + err.message);
          UI.updateConnectionStatus(false);
        }
      },

      handleDisconnect() {
        UI.log('warning', 'Đã ngắt kết nối.');
        this.stopAllNotifications();
        UI.updateConnectionStatus(false);
      },

      async discoverServices() {
        try {
          const services = await this.server.getPrimaryServices();
          UI.renderServices(services, (s) => this.showCharacteristics(s));
        } catch (err) {
          UI.log('error', err.message);
        }
      },

      async showCharacteristics(service) {
        try {
          this.activeCharacteristics = await service.getCharacteristics();
          UI.renderCharacteristics(this.activeCharacteristics, (char, short) => {
            if (char.properties.notify) UI.log('info', `Gõ 'notify ${short}' để xem data.`);
            else if (char.properties.read) Terminal.commands.read(short);
          });
        } catch (err) {
          UI.log('error', err.message);
        }
      },

      async stopAllNotifications() {
        for (const [char, listener] of this.notificationListeners) {
          try {
            await char.stopNotifications();
            char.removeEventListener('characteristicvaluechanged', listener);
          } catch (e) { }
        }
        this.notificationListeners.clear();
      }
    };

    /**
     * MODULE 4: TERMINAL (Tập lệnh & Input)
     */
    const Terminal = {
      input: document.getElementById('terminal-input'),

      init() {
        this.input.addEventListener('keydown', (e) => {
          if (e.key === 'Enter') {
            const val = this.input.value.trim();
            this.input.value = "";
            if (val) this.execute(val);
          }
        });
      },

      /**
       * Hàm bổ trợ để giảm trùng lặp (Helper)
       * @param {string} uuidArg - UUID người dùng nhập
       * @param {Function} callback - Logic xử lý chính nếu tìm thấy Characteristic
       */
      async _runCharCommand(uuidArg, callback) {
        if (!uuidArg) return UI.log('error', 'Thiếu UUID.');

        const char = BLE.activeCharacteristics.find(c => c.uuid.includes(uuidArg.toLowerCase()));
        if (!char) return UI.log('error', `Không tìm thấy Characteristic phù hợp với: ${uuidArg}`);

        try {
          await callback(char);
        } catch (e) {
          UI.log('error', `Lỗi thực thi: ${e.message}`);
        }
      },

      async execute(rawInput) {
        UI.log('default', `> ${rawInput}`);
        const [cmdName, ...args] = rawInput.split(/\s+/);
        const cmd = cmdName.toLowerCase();

        if (this.commands[cmd]) {
          await this.commands[cmd](...args);
        } else {
          UI.log('error', `Lệnh '${cmd}' không hợp lệ. Gõ 'help' để xem danh sách.`);
        }
      },

      commands: {
        help: () => UI.log('info', 'Lệnh: scan, read [uuid], write [uuid] [text], writehex [uuid] [hex], notify [uuid], clear, time, stop notify'),

        scan: () => BLE.scan(),

        clear: () => { UI.elements.logs.innerHTML = ""; },

        time: () => UI.log('info', `Giờ hiện tại: ${new Date().toLocaleTimeString()}`),

        read: async (uuidArg) => {
          await Terminal._runCharCommand(uuidArg, async (char) => {
            const val = await char.readValue();
            const result = Utils.decodeBleValue(val, char.uuid);
            UI.log('success', `READ ${uuidArg}: ${result.hex}${result.interpreted}`);
          });
        },

        write: async (uuidArg, ...textParts) => {
          const text = textParts.join(' ');
          if (!text) return UI.log('error', 'Cú pháp: write [uuid] [nội dung văn bản]');

          await Terminal._runCharCommand(uuidArg, async (char) => {
            const buffer = new TextEncoder().encode(text);
            const writeMethod = char.properties.write ? 'writeValueWithResponse' : 'writeValueWithoutResponse';
            await char[writeMethod](buffer);
            UI.log('success', `WRITE STR -> ${uuidArg}: ${text}`);
          });
        },

        writehex: async (uuidArg, hex) => {
          if (!hex) return UI.log('error', 'Cú pháp: writehex [uuid] [chuỗi hex]');

          await Terminal._runCharCommand(uuidArg, async (char) => {
            const cleanHex = hex.replace(/\s+/g, "");
            if (cleanHex.length % 2 !== 0) throw new Error("Độ dài chuỗi Hex phải là số chẵn.");
            const buffer = new Uint8Array(cleanHex.match(/.{1,2}/g).map(b => parseInt(b, 16)));

            const writeMethod = char.properties.write ? 'writeValueWithResponse' : 'writeValueWithoutResponse';
            await char[writeMethod](buffer);
            UI.log('success', `WRITE HEX -> ${uuidArg}: ${cleanHex}`);
          });
        },

        notify: async (uuidArg) => {
          await Terminal._runCharCommand(uuidArg, async (char) => {
            if (BLE.notificationListeners.has(char)) return UI.log('warning', 'Thông báo đã được bật trước đó.');

            await char.startNotifications();
            const listener = (event) => {
              const result = Utils.decodeBleValue(event.target.value, char.uuid);
              UI.log('info', `[STREAM ${uuidArg}] ${result.hex}${result.interpreted}`);
              if (result.bpm !== null) UI.sendToIframe('BPM_DATA', result.bpm);
            };

            char.addEventListener('characteristicvaluechanged', listener);
            BLE.notificationListeners.set(char, listener);
            UI.log('success', `Đã bật NOTIFY cho ${uuidArg}`);
          });
        },

        stop: (type) => {
          if (type === 'notify') {
            BLE.stopAllNotifications();
            UI.log('success', 'Đã dừng tất cả các luồng thông báo (Notifications).');
          }
        }
      }
    };
    /**
     * MODULE 5: RESIZER & APP INIT
     */
    function initLayout() {
      const resizer = document.getElementById('resizer-v');
      const terminal = document.getElementById('terminal-view');
      let isResizing = false;

      resizer.addEventListener('mousedown', () => {
        isResizing = true;
        document.body.classList.add('resizing');
      });

      document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        const newHeight = window.innerHeight - e.clientY - 28;
        if (newHeight > 80 && newHeight < window.innerHeight * 0.8) {
          terminal.style.height = `${newHeight}px`;
        }
      });

      document.addEventListener('mouseup', () => {
        isResizing = false;
        document.body.classList.remove('resizing');
      });
    }

    window.onload = () => {
      UI.init();
      Terminal.init();
      initLayout();

      // Bind global events
      UI.elements.connectBtn.onclick = () => BLE.scan();
      UI.elements.disconnectBtn.onclick = () => BLE.device?.gatt.disconnect();
    };
  </script>
</body>
