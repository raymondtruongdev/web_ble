<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Transfer - Material Design</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: transparent; /* Suitable for WebView embedding */
            margin: 0;
            padding: 16px;
        }

        /* Material Ripple effect simulation */
        .btn-ripple {
            position: relative;
            overflow: hidden;
            transition: background-color 0.3s, box-shadow 0.3s;
        }

        .btn-ripple:active {
            background-color: rgba(0, 0, 0, 0.1);
        }

        /* Custom File Input */
        .file-input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px;
            border: 1px solid #79747E;
            border-radius: 8px;
            margin-top: 8px;
        }

        input[type="file"] {
            position: absolute;
            left: 0;
            top: 0;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body class="flex justify-center items-start min-h-screen">

    <div class="w-full max-w-md bg-white rounded-3xl shadow-lg border border-gray-100 overflow-hidden">
        <!-- Header -->
        <div class="px-6 py-5 bg-surface-container flex items-center gap-3 border-b border-gray-100">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="#6750A4" viewBox="0 0 256 256"><path d="M224,144v64a16,16,0,0,1-16,16H48a16,16,0,0,1-16-16V144a16,16,0,0,1,16-16h40a8,8,0,0,1,0,16H48v64H208V144H168a8,8,0,0,1,0-16h40A16,16,0,0,1,224,144ZM93.66,77.66,120,51.31V128a8,8,0,0,0,16,0V51.31l26.34,26.35a8,8,0,0,0,11.32-11.32l-40-40a8,8,0,0,0-11.32,0l-40,40A8,8,0,0,0,93.66,77.66Z"></path></svg>
            <h1 class="text-xl font-medium text-gray-900 leading-none">File Transfer</h1>
        </div>

        <div class="p-6 space-y-8">
            <!-- File Selection Section -->
            <section>
                <label class="block text-sm font-medium text-gray-700 mb-2">Select file to send:</label>
                <div class="file-input-wrapper hover:bg-gray-50">
                    <div class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-lg text-sm font-semibold border border-indigo-100">
                        Choose File
                    </div>
                    <span id="file-name" class="text-sm text-gray-500 truncate">No file chosen</span>
                    <input type="file" id="fileInput" onchange="updateFileName()">
                </div>
            </section>

            <!-- File Path Section -->
            <section>
                <label for="filePath" class="block text-sm font-medium text-gray-700 mb-2">Device file path (for receiving):</label>
                <input type="text" id="filePath" placeholder="e.g., /data/config.bin" 
                    class="w-full px-4 py-3 bg-white border border-gray-400 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:border-transparent transition-all placeholder-gray-400">
            </section>

            <!-- Action Buttons Group -->
            <div class="grid grid-cols-1 gap-3 sm:grid-cols-2">
                <button onclick="handleAction('send')" class="btn-ripple flex items-center justify-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-full shadow-md active:shadow-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M227.32,28.68a16,16,0,0,0-15.66-4.08l-.1,0L31.58,82.84a16,16,0,0,0-2.49,29.8L102,154l41.16,72.91a15.94,15.94,0,0,0,14.07,8.09h.73a16,16,0,0,0,15-11.39l58.31-180a16,16,0,0,0-4-15.06ZM157.17,221l-36.8-65.2L182.51,93.66a8,8,0,0,0-11.32-11.32L109.06,144.47,44.11,114.3,212,56.11Z"></path></svg>
                    Send File
                </button>
                
                <button onclick="handleAction('get')" class="btn-ripple flex items-center justify-center gap-2 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-medium py-3 px-4 rounded-full border border-indigo-200">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M224,144v64a16,16,0,0,1-16,16H48a16,16,0,0,1-16-16V144a16,16,0,0,1,16-16h40a8,8,0,0,1,0,16H48v64H208V144H168a8,8,0,0,1,0-16h40A16,16,0,0,1,224,144Zm-101.66,45.66a8,8,0,0,0,11.32,0l40-40a8,8,0,0,0-11.32-11.32L136,164.69V88a8,8,0,0,0-16,0v76.69l-26.34-26.35a8,8,0,0,0-11.32,11.32Z"></path></svg>
                    Get File
                </button>

                <button onclick="handleAction('stop')" class="sm:col-span-2 btn-ripple flex items-center justify-center gap-2 bg-red-500 hover:bg-red-600 text-white font-medium py-3 px-4 rounded-full shadow-md active:shadow-sm mt-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 256 256"><path d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm48-88a8,8,0,0,1-8,8H88a8,8,0,0,1,0-16h80A8,8,0,0,1,176,128Z"></path></svg>
                    Stop Transfer
                </button>
            </div>
        </div>

        <!-- Status Notification (Hidden by default) -->
        <div id="statusBox" class="hidden px-6 py-4 bg-gray-50 border-t border-gray-100 text-center">
            <span id="statusText" class="text-sm text-gray-600">Initializing...</span>
        </div>
    </div>

    <script>
        function updateFileName() {
            const input = document.getElementById('fileInput');
            const label = document.getElementById('file-name');
            if (input.files.length > 0) {
                label.innerText = input.files[0].name;
                label.classList.remove('text-gray-500');
                label.classList.add('text-gray-900');
            } else {
                label.innerText = 'No file chosen';
                label.classList.add('text-gray-500');
                label.classList.remove('text-gray-900');
            }
        }

        function handleAction(type) {
            const statusBox = document.getElementById('statusBox');
            const statusText = document.getElementById('statusText');
            statusBox.classList.remove('hidden');
            
            const path = document.getElementById('filePath').value;

            switch(type) {
                case 'send':
                    statusText.innerText = 'Sending file to: ' + (path || 'default path');
                    break;
                case 'get':
                    statusText.innerText = 'Requesting file from device...';
                    break;
                case 'stop':
                    statusText.innerText = 'Transfer stopped.';
                    setTimeout(() => statusBox.classList.add('hidden'), 3000);
                    break;
            }
            
            // JavaScript Interface communication for Android/iOS WebView can be added here
            // e.g., if (window.AndroidInterface) window.AndroidInterface.sendToDevice(path);
        }
    </script>
</body>
</html>
