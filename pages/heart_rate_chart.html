<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Heart Rate Chart Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-body: #0d1117;
            --text-main: #c9d1d9;
            --text-heading: #ffffff;
            --bg-container: rgba(22, 27, 34, 0.5);
            --border-color: #30363d;
            --btn-bg: #21262d;
            --btn-hover: #30363d;
            --grid-color: rgba(48, 54, 61, 0.5);
            --tick-color: #8b949e;
        }

        .light-mode {
            --bg-body: #f6f8fa;
            --text-main: #24292f;
            --text-heading: #1b1f24;
            --bg-container: #ffffff;
            --border-color: #d0d7de;
            --btn-bg: #f3f4f6;
            --btn-hover: #ebecf0;
            --grid-color: rgba(208, 215, 222, 0.5);
            --tick-color: #57606a;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
        }

        .chart-container {
            flex-grow: 1;
            position: relative;
            background: var(--bg-container);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 10px;
            cursor: grab;
        }

        .chart-container:active {
            cursor: grabbing;
        }

        .control-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .control-btn:hover {
            background: var(--btn-hover);
            border-color: #8b949e;
        }

        .control-btn.active {
            background: rgba(56, 139, 253, 0.15);
            border-color: #58a6ff;
            color: #58a6ff;
        }

        .control-btn-danger:hover {
            background: rgba(248, 81, 73, 0.15);
            border-color: #f85149;
            color: #f85149;
        }

        .stat-card {
            background: var(--bg-container);
            border: 1px solid var(--border-color);
        }

        .text-heading {
            color: var(--text-heading);
        }
    </style>
</head>

<body>
    <!-- Header & Stats -->
    <div class="flex justify-between items-end mb-4">
        <div>
            <div class="flex items-center gap-2">
                <i data-lucide="activity" class="text-red-500 w-5 h-5"></i>
                <h2 class="text-lg font-bold text-heading uppercase tracking-tight">Heart Rate Monitor</h2>
            </div>
            <p class="text-xs text-gray-500 mt-1">Real-time BLE Telemetry System</p>
        </div>

        <div class="flex gap-4">
            <div class="stat-card px-4 py-1 rounded-lg text-right">
                <div class="text-[10px] uppercase text-gray-500 font-bold">Status</div>
                <div id="connectionStatus"
                    class="text-xs font-semibold text-green-500 flex items-center gap-1 justify-end">
                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></span> Receiving
                </div>
            </div>
            <div class="stat-card px-6 py-1 rounded-lg text-center min-w-[100px]">
                <div class="text-[10px] uppercase text-gray-500 font-bold">Live BPM</div>
                <div id="bpmValue" class="text-3xl font-black text-red-500 leading-none mt-1">--</div>
            </div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="flex items-center gap-2 mb-3">
        <button id="zoomIn" class="control-btn" title="Zoom In Y-Axis">
            <i data-lucide="zoom-in" class="w-4 h-4"></i> Zoom In
        </button>
        <button id="zoomOut" class="control-btn" title="Zoom Out Y-Axis">
            <i data-lucide="zoom-out" class="w-4 h-4"></i> Zoom Out
        </button>
        <div class="h-4 w-px bg-gray-700 mx-1"></div>
        <button id="autoScale" class="control-btn active" title="Toggle Auto-Scale">
            <i data-lucide="maximize-2" class="w-4 h-4"></i> Auto Scale
        </button>
        <button id="resetView" class="control-btn" title="Reset to Default View">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i> Reset
        </button>
        <div class="h-4 w-px bg-gray-700 mx-1"></div>
        <button id="themeToggle" class="control-btn" title="Chuyển chế độ Sáng/Tối">
            <i data-lucide="moon" class="w-4 h-4" id="themeIcon"></i> <span id="themeText">Dark</span>
        </button>
        <div class="h-4 w-px bg-gray-700 mx-1"></div>
        <button id="clearData" class="control-btn control-btn-danger" title="Clear all data points">
            <i data-lucide="trash-2" class="w-4 h-4"></i> Clear Data
        </button>
        <div class="ml-auto text-[10px] text-gray-500 italic" id="limitDisplay">Showing last 10 points</div>
    </div>

    <!-- Chart -->
    <div class="chart-container" id="chartContainer">
        <canvas id="heartRateChart"></canvas>
    </div>

    <script>
        // Khởi tạo icon
        lucide.createIcons();

        const ctx = document.getElementById('heartRateChart').getContext('2d');
        const bpmDisplay = document.getElementById('bpmValue');
        const chartContainer = document.getElementById('chartContainer');
        const limitDisplayText = document.getElementById('limitDisplay');

        let isAutoScale = true;
        let yMin = 40;
        let yMax = 160;
        let DISPLAY_LIMIT = 10;
        let isDarkMode = true;

        // Lưu trữ toàn bộ data nhận được để có thể resize số điểm hiển thị
        let allLabels = [];
        let allData = [];

        // Biến phục vụ tính năng Drag
        let isDraggingY = false;
        let isDraggingX = false;
        let isDraggingYScale = false;
        let lastY = 0;
        let lastX = 0;

        // Cấu hình Chart.js
        const chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: [],
                datasets: [{
                    label: 'Heart Rate',
                    data: [],
                    borderColor: '#f85149',
                    backgroundColor: (context) => {
                        const bg = context.chart.ctx.createLinearGradient(0, 0, 0, 400);
                        bg.addColorStop(0, 'rgba(248, 81, 73, 0.3)');
                        bg.addColorStop(1, 'rgba(248, 81, 73, 0)');
                        return bg;
                    },
                    borderWidth: 3,
                    tension: 0.35,
                    pointRadius: 4,
                    pointBackgroundColor: '#f85149',
                    pointBorderColor: isDarkMode ? '#0d1117' : '#ffffff',
                    pointBorderWidth: 2,
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                layout: { padding: { left: 5, right: 5, top: 10, bottom: 0 } },
                scales: {
                    x: {
                        grid: { color: 'rgba(48, 54, 61, 0.5)', drawBorder: false },
                        ticks: { color: '#8b949e', font: { size: 10 }, maxRotation: 0 }
                    },
                    y: {
                        min: yMin,
                        max: yMax,
                        grid: { color: 'rgba(48, 54, 61, 0.8)', drawBorder: false },
                        ticks: {
                            color: '#8b949e',
                            font: { family: 'monospace' },
                            stepSize: 20
                        }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        backgroundColor: '#161b22',
                        titleColor: '#58a6ff',
                        bodyColor: '#fff',
                        borderColor: '#30363d',
                        borderWidth: 1,
                        displayColors: false,
                        callbacks: {
                            label: (context) => `Heart Rate: ${context.parsed.y} BPM`
                        }
                    }
                },
                animation: { duration: 300 }
            }
        });

        // Xử lý chuyển đổi Theme
        document.getElementById('themeToggle').onclick = () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode', !isDarkMode);

            const icon = document.getElementById('themeIcon');
            const text = document.getElementById('themeText');

            if (isDarkMode) {
                icon.setAttribute('data-lucide', 'moon');
                text.textContent = 'Dark';
                chart.options.scales.x.grid.color = 'rgba(48, 54, 61, 0.5)';
                chart.options.scales.y.grid.color = 'rgba(48, 54, 61, 0.8)';
                chart.options.scales.x.ticks.color = '#8b949e';
                chart.options.scales.y.ticks.color = '#8b949e';
                chart.data.datasets[0].pointBorderColor = '#0d1117';
            } else {
                icon.setAttribute('data-lucide', 'sun');
                text.textContent = 'Light';
                chart.options.scales.x.grid.color = 'rgba(208, 215, 222, 0.5)';
                chart.options.scales.y.grid.color = 'rgba(208, 215, 222, 0.8)';
                chart.options.scales.x.ticks.color = '#57606a';
                chart.options.scales.y.ticks.color = '#57606a';
                chart.data.datasets[0].pointBorderColor = '#ffffff';
            }

            lucide.createIcons();
            chart.update('none');
        };

        // Tính năng Zoom bằng con lăn chuột (Mouse Wheel)
        chartContainer.onwheel = (e) => {
            e.preventDefault();
            if (isAutoScale) disableAutoScale();
            const zoomSpeed = 0.05;
            const range = yMax - yMin;
            const direction = e.deltaY > 0 ? 1 : -1;
            const change = range * zoomSpeed * direction;
            yMin -= change;
            yMax += change;
            updateScale();
        };

        function disableAutoScale() {
            isAutoScale = false;
            document.getElementById('autoScale').classList.remove('active');
            const scale = chart.scales.y;
            yMin = scale.min;
            yMax = scale.max;
        }

        chartContainer.onmousedown = (e) => {
            const chartArea = chart.chartArea;
            if (e.offsetX < chartArea.left) {
                isDraggingYScale = true;
                lastY = e.clientY;
                if (isAutoScale) disableAutoScale();
            } else if (e.offsetY > chartArea.bottom) {
                isDraggingX = true;
                lastX = e.clientX;
            } else {
                isDraggingY = true;
                lastY = e.clientY;
                if (isAutoScale) disableAutoScale();
            }
        };

        window.onmousemove = (e) => {
            if (isDraggingYScale) {
                const deltaY = e.clientY - lastY;
                lastY = e.clientY;
                const sensitivity = 0.005;
                const range = yMax - yMin;
                const factor = 1 + (deltaY * sensitivity);
                const mid = (yMax + yMin) / 2;
                const newHalfRange = (range * factor) / 2;
                yMin = mid - newHalfRange;
                yMax = mid + newHalfRange;
                updateScale();
            }
            if (isDraggingY) {
                const deltaY = e.clientY - lastY;
                lastY = e.clientY;
                const scale = chart.scales.y;
                const range = yMax - yMin;
                const unitPerPixel = range / scale.height;
                const moveUnits = deltaY * unitPerPixel;
                yMin += moveUnits;
                yMax += moveUnits;
                updateScale();
            }
            if (isDraggingX) {
                const deltaX = e.clientX - lastX;
                if (Math.abs(deltaX) > 2) {
                    const sensitivity = 0.2;
                    const change = Math.round(deltaX * sensitivity);
                    DISPLAY_LIMIT = Math.max(3, Math.min(200, DISPLAY_LIMIT + change));
                    lastX = e.clientX;
                    updateChartData();
                }
            }
        };

        window.onmouseup = () => {
            isDraggingY = false;
            isDraggingX = false;
            isDraggingYScale = false;
        };

        document.getElementById('zoomIn').onclick = () => {
            if (isAutoScale) disableAutoScale();
            const range = yMax - yMin;
            yMin += range * 0.1;
            yMax -= range * 0.1;
            updateScale();
        };

        document.getElementById('zoomOut').onclick = () => {
            if (isAutoScale) disableAutoScale();
            const range = yMax - yMin;
            yMin -= range * 0.1;
            yMax += range * 0.1;
            updateScale();
        };

        document.getElementById('autoScale').onclick = function () {
            isAutoScale = !isAutoScale;
            this.classList.toggle('active', isAutoScale);
            if (isAutoScale) {
                chart.options.scales.y.min = undefined;
                chart.options.scales.y.max = undefined;
                chart.update();
            } else {
                const scale = chart.scales.y;
                yMin = scale.min;
                yMax = scale.max;
                updateScale();
            }
        };

        document.getElementById('resetView').onclick = () => {
            yMin = 40;
            yMax = 160;
            DISPLAY_LIMIT = 10;
            isAutoScale = true;
            document.getElementById('autoScale').classList.add('active');
            chart.options.scales.y.min = yMin;
            chart.options.scales.y.max = yMax;
            updateChartData();
        };

        document.getElementById('clearData').onclick = () => {
            allLabels = [];
            allData = [];
            bpmDisplay.textContent = "--";
            updateChartData();
        };

        function updateScale() {
            chart.options.scales.y.min = yMin;
            chart.options.scales.y.max = yMax;
            chart.update('none');
        }

        function updateChartData() {
            const startIdx = Math.max(0, allLabels.length - DISPLAY_LIMIT);
            chart.data.labels = allLabels.slice(startIdx);
            chart.data.datasets[0].data = allData.slice(startIdx);
            limitDisplayText.textContent = `Showing last ${DISPLAY_LIMIT} points`;
            chart.update('none');
        }

        window.addEventListener('message', function (event) {
            if (event.data && event.data.type === 'BPM_DATA') {
                const bpm = event.data.value;
                const now = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                bpmDisplay.textContent = bpm;
                allLabels.push(now);
                allData.push(bpm);
                if (allLabels.length > 1000) {
                    allLabels.shift();
                    allData.shift();
                }
                updateChartData();
                if (isAutoScale) {
                    chart.options.scales.y.min = undefined;
                    chart.options.scales.y.max = undefined;
                } else {
                    chart.options.scales.y.min = yMin;
                    chart.options.scales.y.max = yMax;
                }
                chart.update('none');
            }
        });
    </script>
</body>

</html>
